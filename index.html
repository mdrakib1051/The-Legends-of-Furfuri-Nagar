<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Legends Hub | Global Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=Hind+Siliguri:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="access-portal" class="portal-overlay">
        <div class="portal-box">
            <h2 class="glitch-text">LEGENDS_ONLY</h2>
            <p>ACCESS CODE REQUIRED</p>
            <input type="password" id="pass-input" placeholder="••••••••">
            <button onclick="checkAccess()" class="btn-premium">AUTHORIZE</button>
        </div>
    </div>

    <div id="app-content" style="display: none;">
        <div class="bg-overlay"></div>
        <div class="scanlines"></div>

        <header>
            <div class="top-meta">
                <span class="status-live">SYSTEM: ONLINE</span>
                <button id="open-modal" class="btn-create">+ CREATE PROFILE</button>
            </div>
            <h1>THE LEGENDS HUB</h1>
            <p>গ্লোবাল পোর্টাল • মেম্বার সংখ্যা: <span id="total-count">0</span></p>
        </header>

        <main class="container" id="member-grid"></main>

        <footer>
            <p>&copy; 2026 LEGENDS CULT | DEVICE_TOKEN: <span id="device-id"></span></p>
        </footer>
    </div>

    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 class="modal-title">INITIALIZE IDENTITY</h2>
            <form id="member-form">
                <input type="text" id="member-name" placeholder="আপনার নাম (বাংলায়)" required>
                <input type="text" id="member-role" placeholder="পদবী (যেমন: Lead Developer)" required>
                <textarea id="member-bio" placeholder="আপনার সম্পর্কে কিছু বলুন..." rows="3" required></textarea>
                <input type="text" id="avatar-seed" placeholder="Avatar কোড নাম (e.g. Robin)" required>
                <select id="member-status">
                    <option value="online">Online</option>
                    <option value="busy">Busy</option>
                    <option value="offline">Offline</option>
                </select>
                <button type="submit" class="btn-submit" id="submit-btn">GENERATE CARD</button>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
