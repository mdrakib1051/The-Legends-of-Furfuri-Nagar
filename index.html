<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Legends Hub | Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=Hind+Siliguri:wght@300;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-overlay"></div>
    <div class="scanlines"></div>

    <header>
        <div class="top-meta">
            <span class="status-live">SYSTEM ACTIVE</span>
            <button id="open-modal" class="btn-create">+ CREATE PROFILE</button>
        </div>
        <h1>THE LEGENDS HUB</h1>
        <p>আমাদের গ্রুপের লিজেন্ডারি মেম্বারদের ডিজিটাল আইডেন্টিটি। মোট: <span id="total-count">0</span></p>
    </header>

    <main class="container" id="member-grid">
        </main>

    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 class="modal-title">NEW IDENTITY</h2>
            <form id="member-form">
                <input type="text" id="member-name" placeholder="আপনার নাম (বাংলায়)" required>
                <input type="text" id="member-role" placeholder="পদবী (যেমন: Lead Developer)" required>
                <textarea id="member-bio" placeholder="আপনার সম্পর্কে কিছু বলুন..." rows="3" required></textarea>
                <input type="text" id="avatar-seed" placeholder="একটি কোড নাম (অ্যাভাটার তৈরির জন্য)" required>
                <select id="member-status">
                    <option value="online">Online</option>
                    <option value="busy">Busy</option>
                    <option value="offline">Offline</option>
                </select>
                <button type="submit" class="btn-submit">INITIALIZE CARD</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 LEGENDS CULT | REF: <span class="terminal-id"></span></p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
